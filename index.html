<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RULETA NPS</title>

<style>
/* CENTRADO ABSOLUTO */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle,#1b2735,#090a0f);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden; 
  cursor: pointer;
  transition: background 0.5s ease;
}

/* Animación de flashes de fiesta para el fondo cuando hay ganador */
body.fiesta-fondo {
  animation: lucesDiscoteca 1s ease-in-out infinite alternate;
}

@keyframes lucesDiscoteca {
  from { background: radial-gradient(circle, #1a3a4a, #090a0f); }
  to { background: radial-gradient(circle, #2a203a, #050508); }
}

/* CANVAS DE CONFETI EN CAPA SUPERIOR */
#confetti-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 80;
}

/* TITULO GRANDE */
h1 {
  font-size: 55px;
  margin: 10px 0 25px 0;
  text-shadow: 0 0 20px rgba(0, 201, 167, 0.6);
  letter-spacing: 2px;
  user-select: none;
}

/* BOTONES GENERALES */
button, select {
  padding: 14px 22px;
  border-radius: 10px;
  border: none;
  background: #00c9a7;
  color: white;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  transition: background 0.2s, transform 0.1s;
}
button:hover {
  background: #00b395;
  transform: scale(1.05);
}

/* SELECT TEMAS DENTRO DEL PANEL */
select {
  background: #2d3748;
  border: 1px solid #4a5568;
  width: 100%;
  font-size: 16px;
  padding: 10px;
}

/* BOTÓN ESQUINA CONFIG */
#btnConfig {
  position: fixed;
  top: 15px;
  right: 15px;
  font-size: 18px;
  background: #4a5568;
  z-index: 50;
}
#btnConfig:hover { background: #2d3748; }

/* BOTON FULLSCREEN */
#btnFull {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 18px;
  background: #4a5568;
  z-index: 50;
}
#btnFull:hover { background: #2d3748; }

/* CONTENEDOR DE LA RULETA */
#ruleta-box {
  position: relative;
  width: 650px;
  height: 650px;
  margin: 10px auto;
  transition: transform 0.3s ease;
}

/* FLECHA SUPERIOR */
#flecha {
  position: absolute;
  top: -35px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 22px solid transparent;
  border-right: 22px solid transparent;
  border-top: 45px solid #ff3333;
  z-index: 30;
  filter: drop-shadow(0px 5px 8px rgba(0,0,0,0.6));
}

#canvas {
  width: 650px;
  height: 650px;
  border-radius: 50%;
  box-shadow: 0 0 50px rgba(0,0,0,0.95);
  display: block;
}

/* RESULTADO GIGANTE */
#resultado {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  background: rgba(0, 0, 0, 0.95);
  color: #fff;
  padding: 25px 50px;
  border-radius: 60px;
  font-size: 42px;
  font-weight: bold;
  white-space: nowrap;
  max-width: 520px;
  overflow: hidden;
  text-overflow: ellipsis;
  box-shadow: 0 0 45px rgba(0, 201, 167, 0.9), inset 0 0 20px rgba(255,255,255,0.4);
  border: 4px solid #00c9a7;
  z-index: 90;
  pointer-events: none;
  display: none;
}

.ganador-animado {
  animation: pulsoGanador 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite alternate;
}

@keyframes pulsoGanador {
  from { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 35px rgba(0, 201, 167, 0.8); border-color: #00c9a7; }
  to { transform: translate(-50%, -50%) scale(1.12); box-shadow: 0 0 65px rgba(237, 137, 54, 1); border-color: #ed8936; }
}

/* NUEVO: CAPA DE LOGIN INCORPORADA (ABSOLUTA Y ELEGANTE) */
#login-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(10, 12, 18, 0.85);
  backdrop-filter: blur(6px);
  z-index: 110;
  justify-content: center;
  align-items: center;
  cursor: default;
}

.login-box {
  background: #1a202c;
  padding: 35px;
  border-radius: 20px;
  width: 380px;
  text-align: center;
  border: 2px solid #2d3748;
  box-shadow: 0 15px 35px rgba(0,0,0,0.6);
}

.login-box h4 {
  margin: 0 0 10px 0;
  font-size: 22px;
  color: #00c9a7;
  letter-spacing: 1px;
}

.login-box p {
  color: #a0aec0;
  font-size: 13px;
  margin-bottom: 20px;
}

.login-box input[type="password"] {
  width: 100%;
  padding: 14px;
  background: #2d3748;
  border: 1px solid #4a5568;
  border-radius: 8px;
  color: white;
  font-size: 16px;
  text-align: center;
  box-sizing: border-box;
  margin-bottom: 15px;
  outline: none;
}
.login-box input[type="password"]:focus {
  border-color: #00c9a7;
}

.login-box .btn-login {
  width: 100%;
  background: #00c9a7;
  margin-bottom: 10px;
}

.login-box .btn-cancelar-login {
  background: transparent;
  color: #a0aec0;
  font-size: 14px;
  font-weight: normal;
  padding: 5px;
}
.login-box .btn-cancelar-login:hover { color: #fff; transform: none; }

/* PANEL LATERAL DE CONFIGURACIÓN (SIDEBAR) */
#modal {
  display: none;
  position: fixed;
  top: 0; 
  right: 0;
  width: 450px; 
  height: 100%;
  background: rgba(26, 32, 44, 0.96);
  box-shadow: -5px 0 25px rgba(0,0,0,0.7);
  border-left: 2px solid #2d3748;
  z-index: 100;
  cursor: default;
  box-sizing: border-box;
}

.modal-box {
  padding: 25px;
  height: 100%;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
}

.modal-box h3 {
  margin-top: 0;
  font-size: 24px;
  border-bottom: 2px solid #2d3748;
  padding-bottom: 10px;
}

.seccion-config { margin-bottom: 15px; }
.seccion-config label {
  display: block;
  font-weight: bold;
  margin-bottom: 5px;
  color: #a0aec0;
  font-size: 14px;
}

.area-lista-masiva {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 15px;
}
.area-lista-masiva textarea {
  width: 100%;
  height: 100px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #4a5568;
  background: #2d3748;
  color: white;
  font-size: 14px;
  resize: none;
  box-sizing: border-box;
}
.btn-procesar { background: #3182ce; padding: 10px; font-size: 16px; }
.btn-procesar:hover { background: #2b6cb0; }

.acciones-lista {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
  gap: 10px;
}
.btn-mezclar { background: #ed8936; flex: 1; }
.btn-mezclar:hover { background: #dd6b20; }
.btn-cerrar { background: #e53e3e; flex: 1; }
.btn-cerrar:hover { background: #c53030; }

#lista {
  overflow-y: auto;
  flex: 1;
  margin-bottom: 10px;
  padding-right: 5px;
}

.item {
  background: #2d3748;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.item-info { flex: 1; text-align: left; }
.item-nombre {
  font-weight: bold;
  display: block;
  margin-bottom: 4px;
  font-size: 15px;
  color: #e2e8f0;
}

.item-control { display: flex; align-items: center; gap: 8px; }
.item-control input[type="range"] {
  width: 100px;
  accent-color: #00c9a7;
  cursor: pointer;
}
.item-control span {
  font-size: 13px;
  font-weight: bold;
  width: 40px;
  text-align: right;
  color: #a0aec0;
}

.btn-eliminar { background: none; padding: 5px; font-size: 16px; }
.btn-eliminar:hover { background: rgba(255,0,0,0.2); }

#lista::-webkit-scrollbar { width: 6px; }
#lista::-webkit-scrollbar-track { background: #1a202c; }
#lista::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 3px; }
</style>
</head>

<body>

<canvas id="confetti-canvas"></canvas>

<h1>🎰 RULETA DE SUERTE</h1>

<button id="btnFull" onclick="pantallaCompleta(event)">🔳 Pantalla</button>
<button id="btnConfig" onclick="mostrarLogin(event)">⚙️ Config</button>

<div id="ruleta-box">
  <div id="flecha"></div>
  <canvas id="canvas" width="650" height="650"></canvas>
  <div id="resultado"></div>
</div>

<!-- NUEVO: FORMULARIO DE ACCESO DE ADMINISTRADOR INTEGRADO -->
<div id="login-overlay" onclick="event.stopPropagation()">
  <div class="login-box">
    <h4>🔒 ACCESO RESTRINGIDO</h4>
    <p>Por favor, introduzca la contraseña de administrador para realizar modificaciones.</p>
    <input type="password" id="inputClave" placeholder="••••••••" onkeydown="verificarClaveEnter(event)">
    <button class="btn-login" onclick="validarAcceso()">Ingresar</button>
    <br>
    <button class="btn-cancelar-login" onclick="ocultarLogin()">Cancelar</button>
  </div>
</div>

<!-- PANEL LATERAL DE CONFIGURACIÓN -->
<div id="modal" onclick="event.stopPropagation()">
  <div class="modal-box">
    <h3>⚙️ Configuración</h3>

    <div class="seccion-config">
      <label for="selectTema">🎨 Tema de Color de la Ruleta:</label>
      <select id="selectTema" onchange="cambiarTema(this.value)">
        <option value="arcoiris">Arcoíris Brillante</option>
        <option value="neon">Eléctrico / Neón</option>
        <option value="pastel">Tonos Pastel</option>
        <option value="retro">Vintage / Retro</option>
        <option value="monocromatico">Sofisticado Gris y Platino</option>
        <option value="casino">Casino Clásico (Rojo, Negro y Oro)</option>
      </select>
    </div>

    <div class="area-lista-masiva">
      <textarea id="txtListaMasiva" placeholder="Pega o escribe tus nombres aquí (uno por línea)...&#10;Ejemplo:&#10;Juan Perez&#10;Maria Lopez&#10;Carlos Gomez"></textarea>
      <button class="btn-procesar" onclick="procesarListaMasiva()">⚡ Cargar Lista de Nombres</button>
    </div>

    <div class="acciones-lista">
      <button class="btn-mezclar" onclick="mezclar()">🔀 Mezclar Orden</button>
      <button class="btn-cerrar" onclick="cerrarModal()">Guardar y Cerrar</button>
    </div>

    <div id="lista"></div>
  </div>
</div>

<script>
let participantes = [];
let girando = false;
let anguloActual = 0;

let temaActual = "arcoiris";
const paletasColores = {
  neon: ["#ff0055", "#00ffcc", "#9900ff", "#ffcc00", "#ff00ff", "#00ff00"],
  pastel: ["#ffb7b2", "#ffdac1", "#e2f0cb", "#b5ead7", "#c7ceea", "#ff9aa2"],
  retro: ["#e07a5f", "#f4f1de", "#3d5a80", "#98c1d9", "#ee6c4d", "#293241"],
  monocromatico: ["#1a202c", "#4a5568", "#718096", "#cbd5e0", "#a0aec0", "#2d3748"],
  casino: ["#e53e3e", "#1a202c", "#ecc94b", "#1a202c", "#e53e3e", "#ecc94b"]
};

// Audio
let audioCtx = null; let motorOsc = null; let motorGain = null; 
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function iniciarSonidoGiro() {
  initAudio();
  motorOsc = audioCtx.createOscillator(); motorGain = audioCtx.createGain();
  motorOsc.type = 'square'; motorOsc.frequency.setValueAtTime(55, audioCtx.currentTime); 
  motorGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
  motorGain.gain.linearRampToValueAtTime(1.0, audioCtx.currentTime + 0.2); 
  let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(180, audioCtx.currentTime); 
  motorOsc.connect(filter); filter.connect(motorGain); motorGain.connect(audioCtx.destination);
  motorOsc.start();
}

function ajustarFrecuenciaGiro(progreso) { if (motorOsc) motorOsc.frequency.setValueAtTime(55 - (progreso * 35), audioCtx.currentTime); }

function detenerSonidoGiro() {
  if (motorOsc && motorGain) {
    motorGain.gain.cancelScheduledValues(audioCtx.currentTime);
    motorGain.gain.setValueAtTime(motorGain.gain.value, audioCtx.currentTime);
    motorGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); 
    setTimeout(() => { try { motorOsc.stop(); } catch(e){} motorOsc = null; motorGain = null; }, 100);
  }
}

function reproducirTic() {
  initAudio();
  let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
  osc.type = 'triangle'; osc.frequency.setValueAtTime(180, audioCtx.currentTime); 
  gain.gain.setValueAtTime(1.0, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
  osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.06);
}

function reproducirVictoria() {
  initAudio();
  let notas = [261.63, 329.63, 392.00, 523.25];
  notas.forEach((freq, i) => {
    let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
    gain.gain.setValueAtTime(1.0, audioCtx.currentTime + i * 0.1); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(audioCtx.currentTime + i * 0.1); osc.stop(audioCtx.currentTime + i * 0.1 + 0.4);
  });
}

// Confeti
const confettiCanvas = document.getElementById("confetti-canvas"); const confettiCtx = confettiCanvas.getContext("2d");
let confetis = []; let animacionConfetiID = null;
function redimensionarConfeti() { confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
window.addEventListener("resize", redimensionarConfeti); redimensionarConfeti();

function crearConfeti() {
  confetis = [];
  for (let i = 0; i < 180; i++) {
    confetis.push({
      x: Math.random() * confettiCanvas.width, y: Math.random() * -confettiCanvas.height - 20, r: Math.random() * 6 + 5, d: Math.random() * confettiCanvas.height,
      color: `hsl(${Math.random() * 360}, 100%, 55%)`, tilt: Math.random() * 10 - 5, tiltAngleIncremental: Math.random() * 0.06 + 0.03, tiltAngle: 0
    });
  }
}

function lanzarAnimacionConfeti() {
  crearConfeti(); if (animacionConfetiID) cancelAnimationFrame(animacionConfetiID);
  function actualizar() {
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height); let activos = 0;
    confetis.forEach((p) => {
      p.tiltAngle += p.tiltAngleIncremental; p.y += (Math.cos(p.d) + 3 + p.r / 2) / 1.8; p.x += Math.sin(p.tiltAngle); p.tilt = Math.sin(p.tiltAngle - activos / 3) * 15;
      if (p.y <= confettiCanvas.height) activos++;
      confettiCtx.beginPath(); confettiCtx.lineWidth = p.r; confettiCtx.strokeStyle = p.color; confettiCtx.moveTo(p.x + p.tilt + p.r / 2, p.y); confettiCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2); confettiCtx.stroke();
    });
    if (activos > 0 && girando === false) animacionConfetiID = requestAnimationFrame(actualizar);
    else confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
  actualizar();
}

/* NUEVO: FUNCIONES DE LOGUIN SIN VENTANA DEL NAVEGADOR */
function mostrarLogin(e) {
  if (e) e.stopPropagation();
  if (girando) return;
  document.getElementById("inputClave").value = "";
  document.getElementById("login-overlay").style.display = "flex";
  document.getElementById("inputClave").focus();
}

function ocultarLogin() {
  document.getElementById("login-overlay").style.display = "none";
}

function verificarClaveEnter(e) {
  if (e.key === "Enter") validarAcceso();
}

function validarAcceso() {
  let clave = document.getElementById("inputClave").value;
  if (clave === "1234") {
    ocultarLogin();
    abrirModal();
  } else {
    alert("❌ Contraseña de Administrador incorrecta. Acceso Denegado.");
    document.getElementById("inputClave").value = "";
    document.getElementById("inputClave").focus();
  }
}

function pantallaCompleta(e){
  if(e) e.stopPropagation();
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().then(redimensionarConfeti);
  else document.exitFullscreen();
}

function abrirModal(){
  modal.style.display="block";
  document.getElementById("ruleta-box").style.transform = "translateX(-150px)";
  actualizarLista();
}

function cerrarModal(){
  modal.style.display="none";
  document.getElementById("ruleta-box").style.transform = "translateX(0px)";
}

function cambiarTema(nuevoTema) { temaActual = nuevoTema; dibujar(); }

function procesarListaMasiva() {
  let texto = txtListaMasiva.value.trim(); if (!texto) return;
  let lineas = texto.split('\n');
  lineas.forEach(linea => { let nombre = linea.trim(); if (nombre) participantes.push({nombre: nombre, peso: 50}); });
  txtListaMasiva.value = ""; actualizarLista(); dibujar();                 
}

function eliminar(i){ participantes.splice(i,1); actualizarLista(); dibujar(); }
function cambiarProb(i,v){ participantes[i].peso=parseInt(v); document.getElementById(`txt-peso-${i}`).innerText = v + "%"; }

function mezclar() {
  if (participantes.length < 2) return;
  for (let i = participantes.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    let temp = participantes[i]; participantes[i] = participantes[j]; participantes[j] = temp;
  }
  actualizarLista(); dibujar();
}

function actualizarLista(){
  lista.innerHTML = participantes.map((p,i)=>`
    <div class="item">
      <div class="item-info"><span class="item-nombre">${p.nombre.toUpperCase()}</span></div>
      <div class="item-control">
        <input type="range" min="0" max="100" value="${p.peso}" oninput="cambiarProb(${i}, this.value)" onchange="dibujar()">
        <span id="txt-peso-${i}">${p.peso}%</span>
        <button class="btn-eliminar" onclick="eliminar(${i})">❌</button>
      </div>
    </div>
  `).join("");
}

function dibujar(){
  let ctx = canvas.getContext("2d"); ctx.clearRect(0,0,650,650);
  let total = participantes.length; if(total===0) return;
  let anguloInicio=0;

  participantes.forEach((p,i)=>{
    let angulo=(1/total)*2*Math.PI;
    ctx.beginPath(); ctx.moveTo(325,325); ctx.arc(325,325,325,anguloInicio,anguloInicio+angulo);
    if (temaActual === "arcoiris") ctx.fillStyle = `hsl(${i * (360 / total)}, 75%, 55%)`; 
    else ctx.fillStyle = paletasColores[temaActual][i % paletasColores[temaActual].length];
    ctx.fill();

    ctx.save(); ctx.translate(325,325); ctx.rotate(anguloInicio+angulo/2);
    ctx.fillStyle = (temaActual === "monocromatico" && (i % 6 >= 3)) ? "#fff" : "#000";
    if(temaActual === "casino" && (i % 3 === 1)) ctx.fillStyle = "#fff"; 

    ctx.font="bold 26px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    let nombreMayuscula = p.nombre.toUpperCase(); let palabras = nombreMayuscula.split(" "); let lineaAltura = 30; 
    palabras.forEach((palabra, index) => { ctx.fillText(palabra, 175, (index - (palabras.length - 1) / 2) * lineaAltura); });
    ctx.restore();
    anguloInicio+=angulo;
  });
}

function girar(){
  if(girando || participantes.length===0 || modal.style.display === "block" || document.getElementById("login-overlay").style.display === "flex") return;
  let hayValidos = participantes.some(p=>p.peso>0); if(!hayValidos) { resultado.style.display = "block"; resultado.innerText="⚠️ Sin opciones"; return; }

  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  resultado.classList.remove("ganador-animado"); document.body.classList.remove("fiesta-fondo");

  let sumaPesos = participantes.reduce((acc, p) => acc + p.peso, 0); let random = Math.random() * sumaPesos;
  let acumulado = 0; let indexGanador = 0;
  for (let i = 0; i < participantes.length; i++) { acumulado += participantes[i].peso; if (random <= acumulado) { indexGanador = i; break; } }

  let ganador = participantes[indexGanador]; girando = true;
  resultado.style.display = "block"; resultado.innerText = "🎡 ...";

  let totalPartes = participantes.length; let anguloPorParte = 360 / totalPartes;
  let fin = anguloActual + (5 * 360) + (((360 - ((indexGanador * anguloPorParte) + (anguloPorParte / 2)) + 270) % 360) - (anguloActual % 360));
  if (fin < anguloActual + (5 * 360)) fin += 360; 

  let inicio = anguloActual; let start = null; let ultimoAnguloSegmento = 0;
  iniciarSonidoGiro();

  function animar(t){
    if(!start) start = t;
    let progreso = (t - start) / 3500; if(progreso > 1) progreso = 1;
    let angulo = inicio + (fin - inicio) * (1 - Math.pow(1 - progreso, 4));
    anguloActual = angulo % 360; canvas.style.transform = `rotate(${angulo}deg)`;
    ajustarFrecuenciaGiro(progreso);

    if (Math.floor(anguloActual / anguloPorParte) !== ultimoAnguloSegmento) { reproducirTic(); ultimoAnguloSegmento = Math.floor(anguloActual / anguloPorParte); }

    if(progreso < 1) requestAnimationFrame(animar);
    else {
      detenerSonidoGiro(); resultado.innerText = "🏆 " + ganador.nombre.toUpperCase();
      resultado.classList.add("ganador-animado"); document.body.classList.add("fiesta-fondo"); lanzarAnimacionConfeti();
